<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Typography Creator</title>
  <style>
    :root {
      /* Native Figma color tokens with standard fallback values */
      --bg-color: var(--figma-color-bg, #ffffff);
      --panel-bg: var(--figma-color-bg-secondary, #f5f5f5);
      --border-color: var(--figma-color-border, #e6e6e6);
      --text-color: var(--figma-color-text, #333333);
      --text-muted: var(--figma-color-text-secondary, #808080);
      --accent-color: var(--figma-color-bg-brand, #18a0fb);
      --accent-hover: var(--figma-color-bg-brand-hover, #0c8ce9);
      --danger-color: var(--figma-color-text-danger, #f24e1e);
      --input-bg: var(--figma-color-bg, #ffffff);
      --radius: 5px;
    }

    /* Handle native dark mode overrides when testing locally or if Figma variable fails */
    html.figma-dark, @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: var(--figma-color-bg, #2c2c2c);
        --panel-bg: var(--figma-color-bg-secondary, #1e1e1e);
        --border-color: var(--figma-color-border, #444444);
        --text-color: var(--figma-color-text, #ffffff);
        --text-muted: var(--figma-color-text-secondary, #b3b3b3);
        --accent-color: var(--figma-color-bg-brand, #0c8ce9);
        --accent-hover: var(--figma-color-bg-brand-hover, #149bf3);
        --input-bg: var(--figma-color-bg, #333333);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 11px;
      line-height: 1.4;
      height: 525px;
      width: 400px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .content {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-title {
      font-size: 9px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      font-weight: 500;
      color: var(--text-muted);
    }

    /* Combobox styles */
    .combobox-container {
      position: relative;
      width: 100%;
    }

    .combobox-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .combobox-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px 30px 6px 10px;
      font-size: 11px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s ease;
    }

    .combobox-input:focus {
      border-color: var(--accent-color);
    }

    .combobox-chevron {
      position: absolute;
      right: 8px;
      pointer-events: none;
      width: 12px;
      height: 12px;
      fill: var(--text-muted);
      transition: transform 0.15s ease;
    }

    .combobox-container.open .combobox-chevron {
      transform: rotate(180deg);
    }

    .combobox-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 100%;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      display: none;
    }

    .combobox-dropdown.show {
      display: block;
    }

    .dropdown-section-header {
      padding: 6px 10px 4px 10px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      background: var(--panel-bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .combobox-option {
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.1s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-color);
    }

    .combobox-option:hover, 
    .combobox-option.active-highlight {
      background: var(--accent-color);
      color: white;
    }

    .combobox-option:hover .styles-count,
    .combobox-option.active-highlight .styles-count,
    .combobox-option.selected .styles-count {
      color: rgba(255, 255, 255, 0.7);
    }

    .combobox-option.selected {
      background: var(--panel-bg);
      font-weight: 600;
    }

    .combobox-option .styles-count {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Font list layout */
    .fonts-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .font-item {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeIn 0.15s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .font-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .font-item-title {
      font-weight: 600;
      font-size: 11px;
    }

    .remove-btn {
      background: transparent;
      border: none;
      color: var(--danger-color);
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .remove-btn:hover {
      background: rgba(242, 78, 30, 0.1);
    }

    .add-font-btn {
      background: transparent;
      border: 1px dashed var(--border-color);
      color: var(--text-muted);
      border-radius: var(--radius);
      padding: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .add-font-btn:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    /* General Inputs */
    select, input[type="number"], input[type="text"] {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px 10px;
      font-size: 11px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s ease;
    }

    select:focus, input[type="number"]:focus, input[type="text"]:focus {
      border-color: var(--accent-color);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-group input {
      accent-color: var(--accent-color);
      width: 13px;
      height: 13px;
      cursor: pointer;
    }

    /* Weights Checklist */
    .weights-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: var(--panel-bg);
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
    }

    /* Preview Panel */
    .preview-container {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 150px;
      overflow-y: auto;
    }

    .preview-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .preview-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .preview-meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 9px;
    }

    .preview-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-color);
    }

    /* Footer */
    footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel-bg);
      align-items: center;
    }

    footer a:hover {
      text-decoration: underline;
      color: var(--accent-hover);
    }

    button.primary {
      flex: 1;
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 8px;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button.primary:hover {
      background: var(--accent-hover);
    }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 16px;
      font-weight: 500;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button.secondary:hover {
      background: rgba(255,255,255,0.05);
    }

    /* Utility */
    .loading-state {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <div style="font-weight: 500; color: var(--text-muted);">Loading available fonts...</div>
  </div>

  <div id="main-content" style="display: none; height: 100%; flex-direction: column; overflow: hidden;">
    <div class="content">
      <!-- Fonts Selection -->
      <div>
        <div class="section-title">Font Families</div>
        <div class="fonts-list">
          <div class="font-item">
            <div class="font-item-header">
              <span class="font-item-title">Primary Font (Headings)</span>
            </div>
            <div class="form-group">
              <div class="combobox-container" id="primary-font-select"></div>
            </div>
          </div>

          <div class="font-item">
            <div class="font-item-header">
              <span class="font-item-title">Secondary Font (Body / UI)</span>
            </div>
            <div class="form-group">
              <div class="combobox-container" id="secondary-font-select"></div>
            </div>
          </div>

          <div id="additional-fonts-container"></div>
          <button type="button" class="add-font-btn" id="add-font-action">+ Add Additional Font Override</button>
        </div>
      </div>

      <!-- Scale Config -->
      <div>
        <div class="section-title">Scale Settings</div>
        <div class="font-item">
          <div class="form-row">
            <div class="form-group">
              <label for="base-size">Base Size (px)</label>
              <input type="number" id="base-size" value="16" min="8" max="48">
            </div>
            <div class="form-group">
              <label for="scale-ratio">Scale Ratio</label>
              <select id="scale-ratio">
                <option value="1.067">Minor Second (1.067)</option>
                <option value="1.125" selected>Major Second (1.125)</option>
                <option value="1.200">Minor Third (1.200)</option>
                <option value="1.250">Major Third (1.250)</option>
                <option value="1.333">Perfect Fourth (1.333)</option>
                <option value="1.414">Augmented Fourth (1.414)</option>
                <option value="1.500">Perfect Fifth (1.500)</option>
                <option value="1.618">Golden Ratio (1.618)</option>
                <option value="custom">Custom Ratio...</option>
              </select>
            </div>
          </div>
          <div class="form-group" id="custom-ratio-container" style="display: none; margin-top: 8px;">
            <label for="custom-ratio">Custom Scale Factor</label>
            <input type="number" id="custom-ratio" value="1.2" step="0.001" min="1.001" max="3">
          </div>
        </div>
      </div>

      <!-- Weights configuration -->
      <div>
        <div class="section-title">Weights Selection</div>
        <div class="weights-grid">
          <label class="checkbox-group">
            <input type="checkbox" class="weight-checkbox" value="Regular" checked>
            <span>Regular</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" class="weight-checkbox" value="Medium" checked>
            <span>Medium</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" class="weight-checkbox" value="SemiBold">
            <span>SemiBold</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" class="weight-checkbox" value="Bold" checked>
            <span>Bold</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" class="weight-checkbox" value="ExtraBold">
            <span>ExtraBold</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" class="weight-checkbox" value="Black">
            <span>Black</span>
          </label>
        </div>
      </div>

      <!-- Style naming & options -->
      <div>
        <div class="section-title">System Settings</div>
        <div class="font-item">
          <div class="form-group" style="margin-bottom: 8px;">
            <label for="naming-prefix">Style Name Prefix</label>
            <input type="text" id="naming-prefix" value="Brand" placeholder="e.g. Brand, System, Typography">
          </div>
          <div class="form-group" style="margin-bottom: 8px;" id="specimen-theme-container">
            <label for="specimen-theme">Visual Specimen Theme</label>
            <select id="specimen-theme">
              <option value="light">Light Mode (White Bg / Dark Text)</option>
              <option value="dark">Dark Mode (Dark Bg / Light Text)</option>
            </select>
          </div>
          <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 4px;">
            <label class="checkbox-group">
              <input type="checkbox" id="save-local-styles" checked>
              <span>Save as Local Text Styles inside Figma</span>
            </label>
            <label class="checkbox-group">
              <input type="checkbox" id="generate-specimen" checked>
              <span>Generate Visual Specimen Frame in Canvas</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Preview section -->
      <div>
        <div class="section-title">Scale Live Preview (H1 - Caption)</div>
        <div class="preview-container" id="preview-list"></div>
      </div>
    </div>

    <footer>
      <div style="width: 100%; display: flex; gap: 12px;">
        <button type="button" class="secondary" id="cancel-action">Cancel</button>
        <button type="button" class="primary" id="generate-action">Generate System</button>
      </div>
      <div style="font-size: 10px; color: var(--text-muted); text-align: center;">
        designed and built by <a href="https://nijin.site" target="_blank" style="color: var(--accent-color); text-decoration: none; font-weight: 500;">Nijin</a>
      </div>
    </footer>
  </div>

  <script>
    let globalFonts = [];
    let searchableSelects = [];
    let customFontCount = 0;

    // List of popular/common fonts to surface at the top of the search dropdown
    const popularFamilies = [
      "Inter", "Roboto", "SF Pro", "SF Pro Display", "SF Pro Text", "Plus Jakarta Sans",
      "Montserrat", "Poppins", "Open Sans", "Lato", "Helvetica Neue", "Helvetica", "Arial"
    ];

    // Searchable Select Component Class with Keyboard Navigation and Ranking
    class SearchableSelect {
      constructor(container, options, initialValue, onSelect) {
        this.container = container;
        this.options = options; // Array of grouped font objects { family, styles }
        this.onSelect = onSelect;
        this.selectedValue = initialValue;
        this.isOpen = false;
        this.activeIndex = -1;
        
        this.render();
        this.bindEvents();
      }

      render() {
        this.container.innerHTML = `
          <div class="combobox-input-wrapper">
            <input type="text" class="combobox-input" placeholder="Search system font..." value="${this.selectedValue}">
            <svg class="combobox-chevron" viewBox="0 0 24 24">
              <path d="M7 10l5 5 5-5H7z"/>
            </svg>
          </div>
          <div class="combobox-dropdown"></div>
        `;
        
        this.input = this.container.querySelector('.combobox-input');
        this.dropdown = this.container.querySelector('.combobox-dropdown');
        this.chevron = this.container.querySelector('.combobox-chevron');
      }

      bindEvents() {
        // Hide dropdown on click outside
        document.addEventListener('click', (e) => {
          if (!this.container.contains(e.target)) {
            this.closeDropdown();
          }
        });

        // Search filtering: only open and filter when user enters query
        this.input.addEventListener('input', (e) => {
          const query = e.target.value.trim();
          if (query === '') {
            this.closeDropdown();
          } else {
            this.openDropdown();
          }
        });

        // Handle typing entry directly on change
        this.input.addEventListener('change', () => {
          const value = this.input.value;
          const found = this.options.find(o => o.family.toLowerCase() === value.toLowerCase());
          if (found) {
            this.selectedValue = found.family;
            this.input.value = found.family;
            if (this.onSelect) this.onSelect(found);
          }
        });

        // Keyboard navigation
        this.input.addEventListener('keydown', (e) => {
          if (!this.isOpen) {
            if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && this.input.value.trim() !== '') {
              this.openDropdown();
              e.preventDefault();
            }
            return;
          }

          const optionsList = this.dropdown.querySelectorAll('.combobox-option:not([style*="cursor: default"])');
          if (optionsList.length === 0) return;

          if (e.key === 'ArrowDown') {
            e.preventDefault();
            this.activeIndex = (this.activeIndex + 1) % optionsList.length;
            this.highlightOption(optionsList);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            this.activeIndex = (this.activeIndex - 1 + optionsList.length) % optionsList.length;
            this.highlightOption(optionsList);
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (this.activeIndex >= 0 && this.activeIndex < optionsList.length) {
              optionsList[this.activeIndex].click();
            }
          } else if (e.key === 'Escape') {
            e.preventDefault();
            this.closeDropdown();
          }
        });
      }

      openDropdown() {
        const query = this.input.value.trim();
        if (query === '') {
          this.closeDropdown();
          return;
        }
        this.isOpen = true;
        this.container.classList.add('open');
        this.dropdown.classList.add('show');
        this.filterOptions(this.input.value);
      }

      closeDropdown() {
        this.isOpen = false;
        this.container.classList.remove('open');
        this.dropdown.classList.remove('show');
        this.activeIndex = -1;
        
        const value = this.input.value.trim();
        if (value === '') {
          this.selectedValue = '';
          if (this.onSelect) this.onSelect(null);
          return;
        }

        const found = this.options.find(o => o.family.toLowerCase() === value.toLowerCase());
        if (!found && this.selectedValue) {
          this.input.value = this.selectedValue;
        }
      }

      highlightOption(elements) {
        elements.forEach((el, idx) => {
          if (idx === this.activeIndex) {
            el.classList.add('active-highlight');
            el.scrollIntoView({ block: 'nearest' });
          } else {
            el.classList.remove('active-highlight');
          }
        });
      }

      filterOptions(query) {
        const lowercaseQuery = query.trim().toLowerCase();
        
        if (lowercaseQuery === '') {
          this.dropdown.innerHTML = '';
          this.closeDropdown();
          return;
        }

        // Query present: Rank starts-with first, followed by contains (relevance ranking)
        const startsWithQuery = [];
        const containsQuery = [];

        this.options.forEach(o => {
          const name = o.family.toLowerCase();
          if (name.startsWith(lowercaseQuery)) {
            startsWithQuery.push(o);
          } else if (name.includes(lowercaseQuery)) {
            containsQuery.push(o);
          }
        });

        const filtered = [...startsWithQuery, ...containsQuery];
        this.renderList(filtered, []);
      }

      renderList(primaryList, secondaryList) {
        this.dropdown.innerHTML = '';
        this.activeIndex = -1;

        if (primaryList.length === 0 && secondaryList.length === 0) {
          this.dropdown.innerHTML = `<div class="combobox-option" style="color: var(--text-muted); cursor: default; padding: 8px 10px;">No fonts found</div>`;
          return;
        }

        // Helper to append option element
        const appendOption = (opt) => {
          const isSelected = opt.family === this.selectedValue;
          const optionEl = document.createElement('div');
          optionEl.className = `combobox-option ${isSelected ? 'selected' : ''}`;
          optionEl.innerHTML = `
            <span>${opt.family}</span>
            <span class="styles-count">${opt.styles.length} styles</span>
          `;
          
          optionEl.addEventListener('click', (e) => {
            e.stopPropagation();
            this.selectedValue = opt.family;
            this.input.value = opt.family;
            this.closeDropdown();
            if (this.onSelect) this.onSelect(opt);
          });
          
          this.dropdown.appendChild(optionEl);
        };

        // If secondaryList exists, it means we are in "Popular" + "Others" view
        if (secondaryList.length > 0) {
          if (primaryList.length > 0) {
            const header = document.createElement('div');
            header.className = 'dropdown-section-header';
            header.textContent = 'Popular Fonts';
            this.dropdown.appendChild(header);
            primaryList.forEach(appendOption);
          }

          if (secondaryList.length > 0) {
            const header = document.createElement('div');
            header.className = 'dropdown-section-header';
            header.textContent = 'All Fonts';
            this.dropdown.appendChild(header);
            secondaryList.slice(0, 100).forEach(appendOption);
          }
        } else {
          // Simple flat list (filtered search results)
          primaryList.slice(0, 100).forEach(appendOption);
        }
      }

      setValue(val) {
        this.selectedValue = val;
        this.input.value = val;
      }

      getValue() {
        return this.selectedValue;
      }
    }

    // Message receiver from figma controller
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'fonts-loaded') {
        globalFonts = msg.groupedFonts;
        
        // Hide loading state, show main content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';

        initializeForm();
      }
    };

    function initializeForm() {
      // Find standard default fonts
      let defaultPrimary = "Inter";
      let defaultSecondary = "Inter";

      const hasInter = globalFonts.some(f => f.family === "Inter");
      const hasRoboto = globalFonts.some(f => f.family === "Roboto");
      
      if (!hasInter) {
        if (hasRoboto) {
          defaultPrimary = "Roboto";
          defaultSecondary = "Roboto";
        } else if (globalFonts.length > 0) {
          defaultPrimary = globalFonts[0].family;
          defaultSecondary = globalFonts[0].family;
        }
      }

      // Initialize primary font selector
      const primarySelect = new SearchableSelect(
        document.getElementById('primary-font-select'),
        globalFonts,
        defaultPrimary,
        () => updatePreview()
      );
      searchableSelects.push({ role: 'primary', selector: primarySelect });

      // Initialize secondary font selector
      const secondarySelect = new SearchableSelect(
        document.getElementById('secondary-font-select'),
        globalFonts,
        defaultSecondary,
        () => updatePreview()
      );
      searchableSelects.push({ role: 'secondary', selector: secondarySelect });

      // Listen for custom additions
      document.getElementById('add-font-action').addEventListener('click', addAdditionalFontOverride);

      // Listen for input changes to update preview
      document.getElementById('base-size').addEventListener('input', updatePreview);
      
      const scaleRatioSelect = document.getElementById('scale-ratio');
      scaleRatioSelect.addEventListener('change', (e) => {
        const customContainer = document.getElementById('custom-ratio-container');
        if (e.target.value === 'custom') {
          customContainer.style.display = 'flex';
        } else {
          customContainer.style.display = 'none';
        }
        updatePreview();
      });
      document.getElementById('custom-ratio').addEventListener('input', updatePreview);

      document.querySelectorAll('.weight-checkbox').forEach(cb => {
        cb.addEventListener('change', updatePreview);
      });

      // Initial preview render
      updatePreview();
    }

    function addAdditionalFontOverride() {
      customFontCount++;
      const id = `custom-font-${customFontCount}`;
      const container = document.getElementById('additional-fonts-container');
      
      const fontItem = document.createElement('div');
      fontItem.className = 'font-item';
      fontItem.id = `item-${id}`;
      fontItem.innerHTML = `
        <div class="font-item-header">
          <span class="font-item-title">Override Font #${customFontCount}</span>
          <button type="button" class="remove-btn" onclick="removeAdditionalFont('${id}')">
            <svg style="width: 10px; height: 10px; fill: currentColor;" viewBox="0 0 24 24">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
            Remove
          </button>
        </div>
        <div class="form-group">
          <label style="margin-bottom: 4px;">Assign Font Family</label>
          <div class="combobox-container" id="select-${id}"></div>
        </div>
        <div class="form-group">
          <label style="margin-top: 4px;">Apply Override to Category</label>
          <select id="role-${id}" class="custom-role-assignment">
            <option value="code">Monospace / Code Styles</option>
            <option value="accent">Accent Styles</option>
            <option value="display">Display Styles (Override)</option>
            <option value="headings">Headings (Override)</option>
            <option value="body">Body (Override)</option>
          </select>
        </div>
      `;
      
      container.appendChild(fontItem);

      // Create SearchableSelect for the override
      let defaultFont = globalFonts.length > 0 ? globalFonts[0].family : "Inter";
      const monoFont = globalFonts.find(f => f.family.toLowerCase().includes('mono') || f.family.toLowerCase().includes('courier') || f.family.toLowerCase().includes('consolas'));
      if (monoFont) {
        defaultFont = monoFont.family;
      }

      const selector = new SearchableSelect(
        document.getElementById(`select-${id}`),
        globalFonts,
        defaultFont,
        () => updatePreview()
      );

      searchableSelects.push({
        id: id,
        role: 'custom',
        selector: selector
      });

      document.getElementById(`role-${id}`).addEventListener('change', updatePreview);
      updatePreview();
    }

    window.removeAdditionalFont = (id) => {
      const element = document.getElementById(`item-${id}`);
      if (element) {
        element.remove();
      }
      
      // Filter out selector from list
      searchableSelects = searchableSelects.filter(s => s.id !== id);
      updatePreview();
    };

    // Calculate scale factor and return all font sizes
    function calculateScale() {
      const baseSize = parseInt(document.getElementById('base-size').value, 10) || 16;
      let ratio = parseFloat(document.getElementById('scale-ratio').value);
      
      if (isNaN(ratio)) {
        ratio = parseFloat(document.getElementById('custom-ratio').value) || 1.2;
      }

      const levels = [
        { key: 'display1', name: 'Display 1', index: 7, category: 'display' },
        { key: 'display2', name: 'Display 2', index: 6, category: 'display' },
        { key: 'h1', name: 'Heading 1', index: 5, category: 'headings' },
        { key: 'h2', name: 'Heading 2', index: 4, category: 'headings' },
        { key: 'h3', name: 'Heading 3', index: 3, category: 'headings' },
        { key: 'h4', name: 'Heading 4', index: 2, category: 'headings' },
        { key: 'bodyLg', name: 'Body Large', index: 1, category: 'body' },
        { key: 'bodyMd', name: 'Body Medium', index: 0, category: 'body' },
        { key: 'bodySm', name: 'Body Small', index: -1, category: 'body' },
        { key: 'button', name: 'Button', index: 0, category: 'body' },
        { key: 'caption', name: 'Caption', index: -2, category: 'caption' },
        { key: 'overline', name: 'Overline', index: -3, category: 'caption' }
      ];

      return levels.map(level => {
        let size = baseSize * Math.pow(ratio, level.index);
        size = Math.round(size * 10) / 10;
        if (size < 8) size = 8;

        let lhMultiplier = 1.3;
        if (level.category === 'display') {
          lhMultiplier = 1.15;
        } else if (level.category === 'headings') {
          lhMultiplier = 1.25;
        } else if (level.category === 'body') {
          lhMultiplier = 1.5;
        } else if (level.category === 'caption') {
          lhMultiplier = 1.4;
        }

        let lineHeight = Math.round((size * lhMultiplier) / 4) * 4;
        if (lineHeight < size + 4) {
          lineHeight = Math.ceil(size / 4) * 4 + 4;
        }

        return {
          ...level,
          size,
          lineHeight
        };
      });
    }

    function getFontForCategory(category) {
      const overrides = searchableSelects.filter(s => s.role === 'custom');
      for (let i = overrides.length - 1; i >= 0; i--) {
        const ov = overrides[i];
        const assignedRole = document.getElementById(`role-${ov.id}`).value;
        
        if (assignedRole === category) {
          return ov.selector.getValue();
        }
        
        if (assignedRole === 'code' && category === 'code') {
          return ov.selector.getValue();
        }
        if (assignedRole === 'accent' && category === 'accent') {
          return ov.selector.getValue();
        }
      }

      if (category === 'display' || category === 'headings') {
        const prim = searchableSelects.find(s => s.role === 'primary');
        return prim ? prim.selector.getValue() : 'Inter';
      } else {
        const sec = searchableSelects.find(s => s.role === 'secondary');
        return sec ? sec.selector.getValue() : 'Inter';
      }
    }

    function updatePreview() {
      const previewList = document.getElementById('preview-list');
      if (!previewList) return;
      
      previewList.innerHTML = '';
      const scaleItems = calculateScale();

      const previewKeys = ['display2', 'h1', 'h3', 'bodyLg', 'bodyMd', 'caption'];
      const filtered = scaleItems.filter(item => previewKeys.includes(item.key));

      filtered.forEach(item => {
        const font = getFontForCategory(item.category);
        
        const previewItem = document.createElement('div');
        previewItem.className = 'preview-item';
        
        previewItem.innerHTML = `
          <div class="preview-meta">
            <span>${item.name} (${font})</span>
            <span>${item.size}px / ${item.lineHeight}px</span>
          </div>
          <div class="preview-text" style="font-family: '${font}', -apple-system, sans-serif; font-size: ${item.size}px; line-height: ${item.lineHeight}px;">
            The quick brown fox jumps over the lazy dog
          </div>
        `;
        
        previewList.appendChild(previewItem);
      });
    }

    document.getElementById('cancel-action').addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    // Toggle specimen theme select visibility based on checkbox status
    document.getElementById('generate-specimen').addEventListener('change', (e) => {
      const themeContainer = document.getElementById('specimen-theme-container');
      if (e.target.checked) {
        themeContainer.style.display = 'flex';
      } else {
        themeContainer.style.display = 'none';
      }
    });

    document.getElementById('generate-action').addEventListener('click', () => {
      const baseSize = parseInt(document.getElementById('base-size').value, 10) || 16;
      const scaleRatio = document.getElementById('scale-ratio').value;
      const customRatio = parseFloat(document.getElementById('custom-ratio').value) || 1.2;
      const prefix = document.getElementById('naming-prefix').value.trim() || 'Brand';
      const saveLocalStyles = document.getElementById('save-local-styles').checked;
      const generateSpecimen = document.getElementById('generate-specimen').checked;
      const specimenTheme = document.getElementById('specimen-theme').value;

      const checkedWeights = Array.from(document.querySelectorAll('.weight-checkbox:checked'))
                                  .map(cb => cb.value);

      if (checkedWeights.length === 0) {
        alert("Please select at least one font weight to generate.");
        return;
      }

      // Check if primary or secondary font values are empty/cleared
      const primaryFont = getFontForCategory('headings');
      const secondaryFont = getFontForCategory('body');
      if (!primaryFont || primaryFont === '' || !secondaryFont || secondaryFont === '') {
        alert("Please search and select both a Primary and Secondary font family.");
        return;
      }

      const categories = ['display', 'headings', 'body', 'caption'];
      const fontMapping = {};
      categories.forEach(cat => {
        fontMapping[cat] = getFontForCategory(cat);
      });

      const overrides = searchableSelects.filter(s => s.role === 'custom');
      overrides.forEach(ov => {
        const assignedRole = document.getElementById(`role-${ov.id}`).value;
        const ovVal = ov.selector.getValue();
        if (ovVal && ovVal !== '') {
          fontMapping[assignedRole] = ovVal;
        }
      });

      parent.postMessage({
        pluginMessage: {
          type: 'generate-typography',
          settings: {
            baseSize,
            scaleRatio: scaleRatio === 'custom' ? customRatio : parseFloat(scaleRatio),
            prefix,
            saveLocalStyles,
            generateSpecimen,
            specimenTheme,
            weights: checkedWeights,
            fontMapping
          }
        }
      }, '*');
    });

  </script>
</body>
